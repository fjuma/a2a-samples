quarkus.http.port=11000
quarkus.langchain4j.ai.gemini.timeout=42543
quarkus.keycloak.devservices.port=11001
quarkus.langchain4j.ai.gemini.chat-model.model-id=gemini-2.5-flash

# Google OAuth2 Configuration for Calendar API
# Set these values in .env file or as environment variables
google.oauth.client-id=${GOOGLE_CLIENT_ID:your_google_client_id}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:your_google_client_secret}

# Google Calendar OIDC Client Configuration
# We manually handle authorization URL building and callback
# This client is only used for token exchange and refresh
quarkus.oidc-client.google-calendar.discovery-enabled=false
quarkus.oidc-client.google-calendar.token-path=https://oauth2.googleapis.com/token
quarkus.oidc-client.google-calendar.client-id=${GOOGLE_CLIENT_ID:your_google_client_id}
quarkus.oidc-client.google-calendar.credentials.secret=${GOOGLE_CLIENT_SECRET:your_google_client_secret}

# Google Calendar REST Client Configuration
quarkus.rest-client.google-calendar-api.url=https://www.googleapis.com/calendar/v3
quarkus.rest-client.google-calendar-api.scope=jakarta.enterprise.context.ApplicationScoped

